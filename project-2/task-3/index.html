<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insect — Pachyteria equestris</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header">
      <div class="left-head">
        <h1 class="title">INSECT</h1>
      </div>
      <div class="search">
        <i class="ri-search-line search-icon"></i>
        <input type="text" placeholder="search...." class="search-bar" />
      </div>
      <div class="nav">
        <a href="#" class="nav-link">Home</a>
        <a href="#" class="nav-link">Shop</a>
        <a href="#" class="nav-link">About</a>
        <a href="#" class="nav-link">Gallery</a>
        <a href="#" class="nav-link">Contact</a>
      </div>
    </div>

    <!--Main Section-->
    <main class="main-content">
      <div class="left-content">
        <h2 class="sub-title">Classification</h2>
        <ul class="classification-list">
          <li class="list-item">
            <span class="label">Class:</span>
            <span class="value">Insecta</span>
          </li>
          <li class="list-item">
            <span class="label">Order:</span>
            <span class="value">Coleoptera</span>
          </li>
          <li class="list-item">
            <span class="label">Family:</span>
            <span class="value">Cerambycidae</span>
          </li>
          <li class="list-item">
            <span class="label">Sub-Family:</span>
            <span class="value">Cerambycinae</span>
          </li>
          <li class="list-item">
            <span class="label">Tribe:</span>
            <span class="value">Callicromatini</span>
          </li>
          <li class="list-item">
            <span class="label">Genus:</span>
            <span class="value">Pachyteria</span>
          </li>
        </ul>
      </div>

      <div class="center-image">
        <img src="../images/cockroach.png" alt="" />
      </div>

      <div class="right-content">
        <h1 class="right-title">Pachyteria<br>equestris</h1>
        
        <div class="content">
          <div class="info-row">
            <div class="bug-info">
              <img src="../images/cockroach_.png" alt="" class="cockroach" />
              <span class="bug-size">32 mm</span>
            </div>
  
            <div class="vertical-divider"></div>
  
            <div class="details">
              <div class="detail-item">
                <i class="ri-map-pin-line"></i>
                <div>
                  <span class="detail-label">Locality:</span>
                  <span class="detail-value">Malaysia</span>
                </div>
              </div>
  
              <div class="detail-item">
                <i class="ri-men-line"></i>
                <div>
                  <span class="detail-label">Sex:</span>
                  <span class="detail-value">Male</span>
                </div>
              </div>
  
              <div class="detail-item">
                <i class="ri-ruler-line"></i>
                <div>
                  <span class="detail-label">Size:</span>
                  <span class="detail-value">32 mm / 12 mm</span>
                </div>
              </div>
            </div>
          </div>
  
          <p class="price">$5.99</p>
  
          <div class="toggles">
            <label class="toggle-item">
              <input type="checkbox" class="toggle-input" />
              <span class="toggle-slider"></span>
              <span class="toggle-label">View detailed antennae</span>
            </label>
  
            <label class="toggle-item">
              <input type="checkbox" class="toggle-input" />
              <span class="toggle-slider"></span>
              <span class="toggle-label">View underside</span>
            </label>
          </div>
  
          <button class="add-btn">Add to collection</button>
        </div>
      </div>
    </main>
  </body>
</html>
