<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
        rel="stylesheet"
    />
</head>
<body>
    <header class="navbar">
        <div class="nav">
            <span class="nav-logo">ScaleX</span>
            <nav class="nav-actions">
                <a href="#">Home</a>
                <a href="#">About us</a>
                <a href="#">Blog</a>
                <a href="#">Contact us</a>
            </nav>
            <button class = "nav-btn">Get Started</button>
        </div>
    </header>

    <main class="main-content">
        <div class="main-head">
            <h1 class="head">Insights & Blogs</h1>
        </div>

        <div class="main-btn">
            <button class="btn">All</button>
            <button class="btn">Tech</button>
            <button class="btn">SaaS</button>
            <button class="btn">Marketing</button>
        </div>

        <div class="main-cards">
            <div class="card">
                <div class="card-image">
                    <img src="../project-2/images/martini.png" alt="">
                </div>

                <div class="card-body">
                    <span class="card-tag">Tech</span>
                    <h3 class="card-title">The Ultimate Guide To SaaS Marketing</h3>
                    <p class="card-date">May 23, 2025</p>
                </div>
            </div>

            <div class="card">
                <div class="card-image">
                    <img src="../project-2/images/chair.png" alt="">
                </div>

                <div class="card-body">
                    <span class="card-tag">SaaS</span>
                    <h3 class="card-title">5 Key Trends In SaaS Growth For 2025</h3>
                    <p class="card-date">May 23, 2025</p>
                </div>
            </div>
            
            <div class="card">
                <div class="card-image">
                    <img src="../project-2/images/cat.png" alt="">
                </div>

                <div class="card-body">
                    <span class="card-tag">Marketing</span>
                    <h3 class="card-title">How Data-Driven Strategies Are Important</h3>
                    <p class="card-date">May 23, 2025</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
